<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0"   stop-color="#5DA0FB"/>
      <stop offset="0.55" stop-color="#2D7FF9"/>
      <stop offset="1"   stop-color="#1656B8"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lensGlass" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0"   stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#FFFFFF" stop-opacity="0.05"/>
    </radialGradient>
  </defs>

  <!-- Rounded squircle tile -->
  <rect x="6" y="6" width="116" height="116" rx="26" fill="url(#tile)"/>
  <!-- Top sheen -->
  <rect x="6" y="6" width="116" height="68" rx="26" fill="url(#sheen)"/>

  <!-- Magnifying glass -->
  <g transform="translate(0 2)">
    <!-- Handle -->
    <line x1="78" y1="78" x2="100" y2="100"
          stroke="#FFFFFF" stroke-width="11" stroke-linecap="round"/>
    <line x1="78" y1="78" x2="100" y2="100"
          stroke="#1656B8" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <!-- Rim -->
    <circle cx="53" cy="55" r="24" fill="none"
            stroke="#FFFFFF" stroke-width="6"/>
    <!-- Inner glass -->
    <circle cx="53" cy="55" r="20" fill="url(#lensGlass)"/>
    <!-- Centre mark -->
    <text x="53" y="64" text-anchor="middle"
          font-family="JetBrains Mono, Fira Code, monospace"
          font-size="22" font-weight="800" fill="#FFFFFF">{}</text>
  </g>
</svg>
