version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    target-branch: master
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: master
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: dtolnay/rust-toolchain
    labels:
      - dependencies
      - ci
