# cargo-about license aggregation policy.
#
# `accepted` lists every license SPDX expression we are willing to
# accept in the dependency tree. The list mirrors `deny.toml` —
# changes here should land in both files in the same change.
#
# Generate the supplement: `just credits`.
# Output: docs/credits-third-party.md (auto-regenerated, do not edit).

# Exclude the unpublished workspace crates (publish = false) from the generated supplement.
private = { ignore = true }

# Mirrors deny.toml [licenses].allow exactly.
accepted = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "GPL-3.0-only",
    "ISC",
    "LGPL-2.1-or-later",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
