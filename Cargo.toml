[workspace]
members = [
    "apps/grexa-gui",
    "crates/grexa-ai",
    "crates/grexa-cli",
    "crates/grexa-containers",
    "crates/grexa-core",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "GPL-3.0-only"
repository = "https://github.com/visorcraft/grexa"

[workspace.dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
globset = "0.4"
ignore = "0.4"
regex = "1.11"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tempfile = "3.15"
thiserror = "2.0"
unicode-normalization = "0.1"
